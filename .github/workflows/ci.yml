name: CI

on:
  push:
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure core test build
        run: cmake -S . -B build/thesis-core -G Ninja -DHPOEA_BUILD_TESTS=ON

      - name: Build core test targets
        run: cmake --build build/thesis-core

      - name: Run thesis-core tests
        run: ctest --test-dir build/thesis-core -L thesis-core --output-on-failure
